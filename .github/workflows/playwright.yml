name: Playwright API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync

      - name: Write env file
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> .env

      - name: Start API server
        run: |
          uv run uvicorn src.api.main:app --port 8000 &
          echo "Waiting for API..."
          for i in {1..15}; do
            curl -sf http://localhost:8000/health && echo "API ready" && break
            sleep 2
          done
          echo "Health check response:"
          curl -s http://localhost:8000/health
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Verify API health
        run: |
          echo "=== Health Check ==="
          curl -s http://localhost:8000/health

      - name: Debug extraction endpoint
        run: |
          echo "=== Test extraction call ==="
          curl -s -X POST http://localhost:8000/extract \
            -H "Content-Type: application/json" \
            -d '{"text": "Senior Python Engineer at Acme. Remote. $160k-$200k. Python required."}' \
            | python3 -m json.tool || echo "Raw response above"
            
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        working-directory: extraction-api-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: extraction-api-tests
        run: npx playwright test --reporter=list
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: extraction-api-tests/playwright-report/
          retention-days: 7